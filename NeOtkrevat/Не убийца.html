    <h1>Это не я!</h1>
    <div class="container">
    <img src="Пистолет с кроликами.png">
    <div class="text">
    <p>Один из кроликов, стоявших позади — белый, — чуть подаётся вперёд и почти шёпотом говорит:
    </p><p>
— А кто тогда?.. Черныш сказал, это ты… Он видел, как ты стреляла…
</p><p>
Рыжий тут же подхватывает, возбуждённо кивая:
</p><p>
— Точно! Мы кролики — никогда не врём!</p>
